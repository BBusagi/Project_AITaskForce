<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Task Force Desktop</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="root" class="app-shell">
      <main class="desktop-layout" id="desktop-layout">
        <aside class="app-rail" aria-label="App navigation">
          <div class="rail-top">
            <button class="rail-brand" type="button" aria-label="AI Task Force home">
              <span>ATF</span>
            </button>

            <nav class="rail-nav" aria-label="Workspace switcher">
              <button class="rail-item is-active" type="button" data-workspace="chat" aria-label="Chat workspace">
                <span>💬</span>
              </button>
              <button class="rail-item" type="button" data-workspace="team" aria-label="Team workspace">
                <span>👥</span>
              </button>
              <button class="rail-item" type="button" data-workspace="task" aria-label="Task workspace">
                <span>🗂</span>
              </button>
            </nav>
          </div>

          <div class="rail-bottom">
            <div class="rail-runtime">
              <span class="eyebrow">Runtime</span>
              <strong id="runtime-badge">Browser Preview</strong>
            </div>
          </div>
        </aside>

        <aside class="workspace-sidebar" id="workspace-sidebar">
          <div id="workspace-sidebar-content"></div>
        </aside>

        <section class="workspace-stage">
          <div id="workspace-stage-content"></div>
        </section>
      </main>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
